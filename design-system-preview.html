<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elens Design System Workbench</title>
    <script type="module" src="./src/workbench.ts"></script>
    <script>
      if (window.location.protocol === 'file:') {
        document.addEventListener('DOMContentLoaded', () => {
          document.body.innerHTML = '<div style="min-height:100vh;display:grid;place-items:center;background:#070708;color:rgba(255,255,255,.86);font-family:Inter,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;padding:32px;text-align:center"><div><h1 style="margin:0 0 12px;font-size:22px">请通过开发服务器打开 Workbench</h1><p style="margin:0;color:rgba(255,255,255,.62);line-height:1.7">这个页面依赖 Vite 加载 TypeScript 模块，直接双击 HTML 浏览器会拦截模块加载。<br/>运行 <code style="color:#0C8CE9">npm run dev</code> 后打开 <code style="color:#0C8CE9">http://127.0.0.1:4317/design-system-preview.html</code></p></div></div>'
        })
      }
    </script>
    <style>
      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        background: #070708;
        color: rgba(255,255,255,0.86);
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      .wb-shell {
        position: relative;
        min-height: 100vh;
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
      }

      .wb-controls {
        position: sticky;
        top: 0;
        height: 100vh;
        overflow: auto;
        padding: 24px;
        background: color-mix(in srgb, var(--surface-panel, #111113) 96%, black);
        border-right: 1px solid var(--border-default, rgba(255,255,255,0.1));
      }

      .wb-controls-head h1,
      .wb-hero h2 {
        margin: 6px 0 10px;
        font-size: 24px;
        line-height: 1.08;
        letter-spacing: -0.04em;
        color: var(--text-primary, rgba(255,255,255,0.86));
      }

      .wb-controls-head p,
      .wb-hero p {
        margin: 0;
        color: var(--text-secondary, rgba(255,255,255,0.7));
        font-size: 12px;
        line-height: 1.7;
      }

      .wb-eyebrow {
        display: inline-flex;
        color: var(--interactive-accent, #0C8CE9);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .wb-control-section {
        margin-top: 24px;
        padding-top: 20px;
        border-top: 1px solid var(--border-subtle, rgba(255,255,255,0.08));
      }

      .wb-control-section h2 {
        margin: 0 0 12px;
        color: var(--text-primary, rgba(255,255,255,0.86));
        font-size: 13px;
      }

      .wb-field {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
      }

      .wb-field-label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--text-tertiary, rgba(255,255,255,0.45));
        font-size: 11px;
      }

      .wb-field-label-text {
        display: inline-block;
      }

      .wb-help-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        padding: 0;
        border: 1px solid var(--border-hover, rgba(255,255,255,0.12));
        border-radius: 999px;
        background: color-mix(in srgb, var(--surface-field, rgba(255,255,255,0.06)) 90%, black);
        color: var(--interactive-accent, #0C8CE9);
        font-size: 10px;
        font-weight: 700;
        line-height: 1;
        cursor: pointer;
      }

      .wb-inline-term {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .wb-help-tooltip {
        position: absolute;
        z-index: 20;
        max-width: 240px;
        border-radius: 8px;
        background: var(--surface-panel, #111113);
        border: 1px solid var(--border-default, rgba(255,255,255,0.1));
        box-shadow: var(--shadow-dropdown, 0 20px 50px rgba(0,0,0,0.55));
        padding: 6px 10px;
        pointer-events: none;
      }

      .wb-help-tooltip[hidden] {
        display: none !important;
      }

      .wb-input,
      .wb-output {
        width: 100%;
        min-height: var(--input-height, 24px);
        border: 1px solid var(--border-hover, rgba(255,255,255,0.12));
        border-radius: var(--field-radius, 5px);
        background: var(--surface-field, rgba(255,255,255,0.06));
        color: var(--text-primary, rgba(255,255,255,0.86));
        font: inherit;
        font-size: 12px;
        padding: 6px 8px;
        outline: none;
      }

      .wb-input:focus,
      .wb-output:focus {
        border-color: var(--interactive-accent, #0C8CE9);
      }

      .wb-readonly-field {
        display: grid;
        gap: 3px;
        min-height: var(--input-height, 24px);
        padding: 6px 8px;
        border: 0.5px dashed var(--border-hover, rgba(255,255,255,0.12));
        border-radius: var(--field-radius, 5px);
        background: var(--surface-panel, #111113);
      }

      .wb-readonly-value {
        color: var(--text-primary, rgba(255,255,255,0.86));
        font-size: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      .wb-readonly-desc {
        color: var(--text-tertiary, rgba(255,255,255,0.45));
        font-size: 11px;
        line-height: 1.45;
      }

      input[type="color"].wb-input {
        height: 34px;
        padding: 4px;
      }

      .wb-output {
        height: 180px;
        resize: vertical;
        line-height: 1.5;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      .wb-button {
        width: 100%;
        height: 32px;
        border: 0;
        border-radius: var(--radius-xl, 8px);
        background: var(--interactive-accent, #0C8CE9);
        color: var(--overlay-label-text, white);
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }

      .wb-main {
        padding: 32px;
        overflow: hidden;
      }

      .wb-hero {
        max-width: 820px;
        margin-bottom: 24px;
        padding: 24px;
        border: 1px solid var(--border-default, rgba(255,255,255,0.1));
        border-radius: var(--panel-radius, 18px);
        background: color-mix(in srgb, var(--surface-panel, #111113) 94%, transparent);
        box-shadow: var(--panel-shadow, 0 20px 50px rgba(0,0,0,0.55));
      }

      .wb-stage {
        position: relative;
        min-height: 640px;
        border-radius: 28px;
        overflow: hidden;
        border: 1px solid var(--border-default, rgba(255,255,255,0.1));
        background:
          radial-gradient(circle at 20% 0%, color-mix(in srgb, var(--interactive-accent, #0C8CE9) 20%, transparent), transparent 34%),
          linear-gradient(135deg, color-mix(in srgb, var(--surface-panel, #111113) 82%, black), #09090b);
      }

      .wb-stage .ei-toolbar {
        top: 28px;
        left: 28px;
      }

      .wb-panel-sample {
        top: 96px;
        left: 28px;
      }

      .wb-stage .ei-toolbar,
      .wb-stage .ei-panel {
        position: absolute;
      }

      .wb-token-grid,
      .wb-gallery-grid,
      .wb-state-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
        margin-top: 20px;
      }

      .wb-section {
        margin-top: 20px;
      }

      .wb-section-head {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 10px;
      }

      .wb-section-head h3 {
        margin: 0;
        color: var(--text-primary, rgba(255,255,255,0.86));
        font-size: 16px;
      }

      .wb-section-head p {
        margin: 4px 0 0;
        color: var(--text-tertiary, rgba(255,255,255,0.45));
        font-size: 12px;
        line-height: 1.6;
      }

      .wb-kv {
        display: grid;
        grid-template-columns: 76px minmax(0, 1fr);
        gap: 8px;
        align-items: center;
        margin-top: 8px;
        font-size: 12px;
      }

      .wb-kv-label {
        color: var(--text-tertiary, rgba(255,255,255,0.45));
      }

      .wb-kv-value {
        color: var(--text-primary, rgba(255,255,255,0.86));
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .wb-state-list,
      .wb-gallery-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .wb-state-row,
      .wb-gallery-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .wb-state-row > .ei-dp-field,
      .wb-state-row > .ei-dp-fill-trigger,
      .wb-state-row > .ei-dp-font-select,
      .wb-state-row > .ei-capture-menu-item,
      .wb-state-row > .ei-tab,
      .wb-state-row > .ei-annotate-input,
      .wb-state-row > .ei-ann-item,
      .wb-state-row > .ei-tooltip {
        flex: 1;
        min-width: 0;
      }

      .wb-state-row > .ei-toolbar-btn {
        flex: 0 0 auto;
      }

      .wb-state-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 88px;
        height: 28px;
        padding: 0 12px;
        border-radius: var(--radius-xl, 8px);
        border: 1px solid var(--border-default, rgba(255,255,255,0.1));
        font-size: 12px;
        color: var(--text-primary, rgba(255,255,255,0.86));
      }

      .wb-state-chip.is-hover { background: var(--surface-hover); }
      .wb-state-chip.is-active { background: var(--surface-active); }
      .wb-state-chip.is-selected { background: var(--interactive-accent-soft); color: var(--interactive-accent); }
      .wb-state-chip.is-success { background: var(--success-bg); color: var(--success); }
      .wb-state-chip.is-danger { background: var(--danger-bg); color: var(--danger); }
      .wb-state-chip.is-disabled { opacity: 0.42; background: var(--surface-field); }
      .wb-state-chip.is-focus { box-shadow: 0 0 0 2px color-mix(in srgb, var(--interactive-focus-ring) 30%, transparent); }

      .wb-preview-default { }
      .wb-preview-hover { background: var(--surface-hover) !important; }
      .wb-preview-active { background: var(--surface-active) !important; }
      .wb-preview-selected { background: var(--interactive-accent-soft) !important; color: var(--interactive-accent) !important; }
      .wb-preview-focus { box-shadow: 0 0 0 2px color-mix(in srgb, var(--interactive-focus-ring) 30%, transparent) !important; }
      .wb-preview-disabled { opacity: 0.42 !important; pointer-events: none !important; }

      .wb-preview-selected.ei-toolbar-btn[data-active="true"] {
        background: var(--interactive-accent) !important;
        color: var(--overlay-label-text) !important;
      }

      .wb-preview-hover.ei-capture-menu-item,
      .wb-preview-active.ei-capture-menu-item,
      .wb-preview-selected.ei-capture-menu-item,
      .wb-preview-hover.ei-ann-item,
      .wb-preview-active.ei-ann-item,
      .wb-preview-selected.ei-ann-item,
      .wb-preview-hover.ei-tab,
      .wb-preview-active.ei-tab,
      .wb-preview-selected.ei-tab,
      .wb-preview-hover.ei-crumb,
      .wb-preview-active.ei-crumb,
      .wb-preview-selected.ei-crumb,
      .wb-preview-hover.ei-dp-fill-trigger,
      .wb-preview-active.ei-dp-fill-trigger,
      .wb-preview-selected.ei-dp-fill-trigger {
        opacity: 1;
      }

      .wb-preview-hover.ei-ann-item,
      .wb-preview-hover.ei-capture-menu-item,
      .wb-preview-hover.ei-crumb,
      .wb-preview-hover.ei-dp-fill-trigger { background: var(--surface-hover) !important; }

      .wb-preview-active.ei-ann-item,
      .wb-preview-active.ei-tab,
      .wb-preview-active.ei-crumb,
      .wb-preview-active.ei-dp-fill-trigger { background: var(--surface-active) !important; }

      .wb-preview-selected.ei-ann-item,
      .wb-preview-selected.ei-tab,
      .wb-preview-selected.ei-crumb { background: var(--interactive-accent-soft) !important; color: var(--interactive-accent) !important; }

      .wb-preview-focus.ei-dp-field,
      .wb-preview-focus.ei-annotate-input { border-color: var(--interactive-accent) !important; }

      .wb-preview-disabled.ei-ann-item,
      .wb-preview-disabled.ei-capture-menu-item { opacity: 0.45 !important; }

      .wb-segmented {
        display: flex;
        gap: 8px;
      }

      .wb-tooltip-demo {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        position: relative;
      }

      .wb-tooltip-sample {
        position: relative;
        inset: auto;
        max-width: 220px;
        display: block;
      }

      .wb-annotation-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .wb-breadcrumbs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .wb-gallery-stack {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .wb-gallery-inline {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .wb-ghost-panel {
        padding: 12px;
        border-radius: 12px;
        border: 1px solid var(--border-default, rgba(255,255,255,0.1));
        background: var(--surface-field, rgba(255,255,255,0.06));
      }

      .wb-color-table {
        border-top: 1px solid var(--border-subtle, rgba(255,255,255,0.08));
      }

      .wb-color-row {
        display: grid;
        grid-template-columns: 180px 220px minmax(180px, 1fr) minmax(220px, 1.2fr);
        gap: 16px;
        align-items: start;
        padding: 14px 0;
        border-bottom: 1px solid var(--border-subtle, rgba(255,255,255,0.08));
      }

      .wb-color-head {
        padding-top: 0;
        color: var(--text-tertiary, rgba(255,255,255,0.45));
        font-size: 11px;
      }

      .wb-color-name {
        color: var(--text-primary, rgba(255,255,255,0.86));
        font-size: 13px;
        font-weight: 600;
      }

      .wb-color-token {
        color: var(--text-faint, rgba(255,255,255,0.25));
        font-size: 11px;
        margin-top: 4px;
      }

      .wb-color-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 32px;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid var(--border-default, rgba(255,255,255,0.1));
        background: var(--surface-panel, #111113);
      }

      .wb-color-swatch {
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
        border-radius: 5px;
        border: 0.5px dashed var(--border-hover, rgba(255,255,255,0.12));
      }

      .wb-color-value {
        color: var(--text-primary, rgba(255,255,255,0.86));
        font-size: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      .wb-color-usage-col,
      .wb-color-source-col {
        color: var(--text-secondary, rgba(255,255,255,0.7));
        font-size: 12px;
        line-height: 1.6;
      }

      .wb-color-source-col {
        color: var(--text-tertiary, rgba(255,255,255,0.45));
      }

      .wb-color-head .wb-color-usage-col,
      .wb-color-head .wb-color-source-col,
      .wb-color-head .wb-color-name-col,
      .wb-color-head .wb-color-preview-col {
        color: var(--text-tertiary, rgba(255,255,255,0.45));
        font-size: 11px;
        line-height: 1.4;
      }

      @media (max-width: 1200px) {
        .wb-color-row {
          grid-template-columns: 1fr;
          gap: 8px;
        }

        .wb-color-head {
          display: none;
        }
      }

      .wb-library-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .wb-library-tab {
        height: 30px;
        padding: 0 12px;
        border: 1px solid var(--border-default, rgba(255,255,255,0.1));
        border-radius: 999px;
        background: var(--surface-field, rgba(255,255,255,0.06));
        color: var(--text-secondary, rgba(255,255,255,0.7));
        font: inherit;
        font-size: 12px;
        cursor: pointer;
      }

      .wb-library-tab.is-active {
        background: var(--interactive-accent, #0C8CE9);
        color: var(--overlay-label-text, white);
        border-color: transparent;
      }

      .wb-sample-meta {
        display: grid;
        gap: 10px;
        margin-bottom: 14px;
      }

      .wb-sample-desc {
        margin: 0;
        color: var(--text-secondary, rgba(255,255,255,0.7));
        font-size: 12px;
        line-height: 1.6;
      }

      .wb-class-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .wb-class-tag,
      .wb-sample-badge {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 0 8px;
        border-radius: 999px;
        border: 1px solid var(--border-default, rgba(255,255,255,0.1));
        background: var(--surface-field, rgba(255,255,255,0.06));
        font-size: 11px;
      }

      .wb-class-tag {
        color: var(--text-primary, rgba(255,255,255,0.86));
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      .wb-sample-badge {
        color: var(--interactive-accent, #0C8CE9);
      }

      .wb-rule-intro {
        margin: 0 0 12px;
        color: var(--text-secondary, rgba(255,255,255,0.7));
        font-size: 12px;
        line-height: 1.6;
      }

      .wb-rule-list {
        margin: 0;
        padding-left: 18px;
        color: var(--text-primary, rgba(255,255,255,0.86));
        font-size: 12px;
        line-height: 1.7;
      }

      .wb-rule-list li + li {
        margin-top: 6px;
      }

      .wb-rule-note {
        display: grid;
        gap: 10px;
        margin-top: 16px;
        padding-top: 14px;
        border-top: 1px solid var(--border-subtle, rgba(255,255,255,0.08));
      }

      .wb-rule-note p {
        margin: 0;
        color: var(--text-secondary, rgba(255,255,255,0.7));
        font-size: 12px;
        line-height: 1.6;
      }

      .wb-pending-audit {
        display: grid;
        gap: 8px;
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid var(--border-subtle, rgba(255,255,255,0.08));
      }

      .wb-code-block {
        margin: 0;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid var(--border-default, rgba(255,255,255,0.1));
        background: color-mix(in srgb, var(--surface-field, rgba(255,255,255,0.06)) 92%, black);
        color: var(--text-primary, rgba(255,255,255,0.86));
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 11px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .wb-embedded-panel {
        position: relative !important;
        top: auto !important;
        left: auto !important;
        width: 100% !important;
      }

      .wb-help-tooltip .ei-tt-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 16px;
        margin-bottom: 4px;
      }

      .wb-help-tooltip .ei-tt-tag {
        font-weight: 700;
        color: var(--interactive-accent, #0C8CE9);
        font-size: 12px;
      }

      .wb-help-tooltip .ei-tt-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .wb-help-tooltip .ei-tt-val {
        color: var(--text-primary, rgba(255,255,255,0.86));
        font-size: 12px;
        line-height: 1.5;
      }

      .wb-help-tooltip .ei-tt-label {
        color: var(--text-tertiary, rgba(255,255,255,0.45));
      }

      .wb-help-tooltip .ei-tt-size {
        color: var(--text-tertiary, rgba(255,255,255,0.45));
      }

      .wb-help-tooltip .ei-tt-swatch {
        width: 10px;
        height: 10px;
        border-radius: 3px;
        border: 1px solid var(--border-hover, rgba(255,255,255,0.12));
      }

      .wb-help-tooltip .ei-tt-divider {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 6px 0 4px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-tertiary, rgba(255,255,255,0.45));
      }

      .wb-help-tooltip .ei-tt-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border-default, rgba(255,255,255,0.1));
      }

      .wb-help-tooltip .ei-tt-no,
      .wb-help-tooltip .ei-tt-yes {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        font-size: 10px;
        line-height: 1;
      }

      .wb-help-tooltip .ei-tt-no {
        background: var(--surface-field, rgba(255,255,255,0.06));
        color: var(--text-tertiary, rgba(255,255,255,0.45));
      }

      .wb-help-tooltip .ei-tt-yes {
        background: var(--success-bg, rgba(25,196,125,0.16));
        color: var(--success, #19c47d);
      }

      .wb-help-tooltip .ei-tt-val,
      .wb-help-tooltip .ei-tt-tag,
      .wb-help-tooltip .ei-tt-size,
      .wb-help-tooltip .ei-tt-label {
        white-space: normal;
      }

      .wb-help-tooltip .ei-tt-row:last-child {
